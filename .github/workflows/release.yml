name: Release Chrome Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync version from tag
        run: npm run version:set -- ${GITHUB_REF_NAME#v}

      - name: Build Chrome release package
        run: npm run release:build:chrome

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*-chrome.zip
            release/*-chrome.sha256.txt
