name: Release Chrome Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync version from tag
        run: npm run version:set -- ${GITHUB_REF_NAME#v}

      - name: Build Chrome release package
        run: npm run release:build:chrome

      - name: Generate release notes
        run: node scripts/generate-release-notes.mjs "${GITHUB_REF_NAME}" > release/release-notes.md

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          body_path: release/release-notes.md
          files: |
            release/*-chrome.zip
